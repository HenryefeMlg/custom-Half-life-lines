<!DOCTYPE html>
<html lang="tr">
<head>
    <label for="import-zip" class="btn-import">📂 Eski Projeyi (ZIP) Yükle</label>
<input type="file" id="import-zip" accept=".zip" style="display:none;">
    <meta charset="UTF-8">
    <title>Half-Life Gelişmiş Ses ve Metin Mod Paneli</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #141419; 
            color: #fff; 
            display: flex; 
            margin: 0; 
            height: 100vh; 
            overflow: hidden; 
            box-sizing: border-box;
        }
        *, *::before, *::after { box-sizing: border-box; }

        #project-section { 
            width: 260px; 
            background: #0f0f13; 
            border-right: 1px solid #23232a; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
        }
        .section-title {
            color: #8e8e93;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            margin-top: 20px;
        }
        .btn { 
            padding: 12px; 
            font-size: 14px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: all 0.2s ease;
            text-align: center;
        }
        .btn-add { background: #ff9f43; color: #0f0f13; width: 100%; margin-bottom: 15px; }
        .btn-add:hover { background: #ffb366; }
        
        /* YEŞİL ZIP BUTONUNUN STİLİ */
        .btn-zip { background: #10ac84; color: white; width: 100%; margin-top: auto; margin-bottom: 10px; }
        .btn-zip:hover { background: #1dd1a1; }
        
        .project-card { 
            background: #1e1e24; 
            padding: 12px; 
            border-radius: 6px; 
            margin-bottom: 10px; 
            cursor: pointer; 
            border: 2px solid transparent; 
        }
        .project-card.active { border-color: #ff9f43; background: #25252d; }
        .project-card input { 
            background: transparent; 
            border: none; 
            color: white; 
            font-size: 14px; 
            font-weight: bold; 
            width: 100%; 
            outline: none; 
        }

        .nav-tab {
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 5px;
            cursor: pointer;
            display: flex;
            align-items: center;
            font-size: 14px;
            color: #a1a1aa;
        }
        .nav-tab:hover, .nav-tab.active {
            background: #23232a;
            color: #fff;
        }

        #sidebar { 
            width: 320px; 
            background: #18181f; 
            border-right: 1px solid #23232a; 
            display: flex;
            flex-direction: column;
        }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #23232a; }
        .sidebar-content { flex: 1; overflow-y: auto; padding: 15px; }
        
        .file-item { 
            padding: 10px; 
            cursor: pointer; 
            border-radius: 6px; 
            display: flex; 
            flex-direction: column;
            gap: 4px;
            margin-bottom: 6px; 
            background: #1e1e24;
            border: 1px solid transparent;
        }
        .file-item:hover { border-color: #3d3d4a; background: #23232a; }
        .file-item.active { border-color: #54a0ff; background: #23232a; }
        .badge-saved { 
            background: #10ac84; 
            color: white; 
            font-size: 10px; 
            padding: 3px 6px; 
            border-radius: 4px; 
            font-weight: bold; 
            align-self: flex-start;
        }
        .folder-item {
            font-weight: bold;
            color: #ff9f43;
            margin: 8px 0 4px 0;
            font-size: 14px;
        }

        #main { 
            flex: 1; 
            padding: 30px; 
            display: flex; 
            flex-direction: column; 
            background: #212129; 
            overflow: hidden;
        }
        .work-container { display: none; flex-direction: column; height: 100%; justify-content: center; align-items: center; }
        .work-container.active { display: flex; }

        .btn-record { background: #ee5253; color: white; }
        .btn-stop { background: #10ac84; color: white; display: none; }
        .btn-play { background: #54a0ff; color: white; }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }
        #status { color: #ff9f43; font-weight: bold; margin-top: 15px; height: 20px; }

        .text-controls {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #18181f;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .load-mode-status { font-size: 12px; color: #8e8e93; }
        .mode-indicator { padding: 4px 8px; background: #3a3a4c; color: #00ffcc; border-radius: 4px; font-weight: bold; }
        .btn-load-all { background: #5f27cd; color: white; padding: 8px 16px; font-size: 13px; border:none; border-radius:4px; cursor:pointer;}

        .text-list-container { width: 100%; flex: 1; overflow-y: auto; background: #18181f; border-radius: 8px; padding: 15px; }
        .text-row { display: flex; gap: 15px; margin-bottom: 12px; background: #212129; padding: 10px; border-radius: 6px; border: 1px solid #2d2d3a; }
        .text-key { width: 30%; font-family: monospace; color: #ff9f43; background: #141419; padding: 8px; border-radius: 4px; border: 1px solid #3d3d4a; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .text-val { flex: 1; background: #141419; color: #fff; border: 1px solid #3d3d4a; padding: 8px; border-radius: 4px; font-size: 14px; outline: none; }
        .text-val:focus { border-color: #ff9f43; }
        .loading-trigger { text-align: center; padding: 15px; color: #8e8e93; font-size: 13px; font-style: italic; }

        /* Klasör Seçme Butonu */
        .file-upload-btn {
            background: #ff9f43;
            color: #0f0f13;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            display: block;
            text-align: center;
            cursor: pointer;
            margin-bottom: 15px;
        }
        #folder-select { display: none; }
    </style>
</head>
<body>

    <div id="project-section">
        <label for="folder-select" class="file-upload-btn">📁 'sound' Klasörünü Seç</label>
        <input type="file" id="folder-select" webkitdirectory directory multiple>

        <button id="btn-new-project" class="btn btn-add">+ Yeni Kart / Proje</button>
        
        <div class="section-title">Navigasyon</div>
        <div class="nav-tab active" id="tab-audio-mode" onclick="switchMode('audio')">🔊 Ses Dosyaları</div>
        <div class="nav-tab" id="tab-text-mode" onclick="switchMode('text')">📝 Ekran & Telsiz Metinleri</div>

        <button id="btn-download-mod" class="btn btn-zip">🎁 MODU ZIP OLARAK İNDİR</button>

        <div class="section-title">Projeleriniz</div>
        <div id="project-list"></div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header">
            <h3 id="sidebar-title" style="margin:0; font-size:16px;">Ses Dosyaları</h3>
        </div>
        <div class="sidebar-content" id="sidebar-list-container">
            <span style="color:#8e8e93; font-size:13px;">Lütfen üstteki butondan oyunun orijinal "sound" klasörünü seçin.</span>
        </div>
    </div>

    <div id="main">
        <div id="audio-work-space" class="work-container active">
            <h2 id="current-file" style="margin-bottom: 20px; text-align: center;">Lütfen sol taraftan bir ses dosyası seçin</h2>
            
            <div style="display: flex; gap: 15px;">
                <button id="btn-play-original" class="btn btn-play" disabled>🔊 Orijinal Dosyayı Dinle</button>
                <button id="btn-play-custom" class="btn btn-play" style="background:#10ac84; display: none;">🎧 Şimdiki Kaydını Dinle</button>
            </div>
            
            <hr style="width: 50%; border-color: #2d2d3a; margin: 30px 0;">
            
            <button id="btn-start" class="btn btn-record" disabled>🎙️ Kayda Başla</button>
            <button id="btn-stop" class="btn btn-stop">🛑 Kaydı Bitir ve Kaydet</button>
            
            <p id="status"></p>
        </div>

        <div id="text-work-space" class="work-container">
            <div class="text-controls">
                <div class="load-mode-status">
                    Mod Durumu: <span class="mode-indicator" id="load-indicator">Lazy Load</span>
                </div>
                <button class="btn btn-load-all" id="btn-load-all-text">Hepsini Yükle</button>
            </div>
            <div class="text-list-container" id="text-items-box"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
