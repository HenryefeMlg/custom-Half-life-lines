<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Half-Life Gelişmiş Ses Modu Aracı</title>
    <style>
        :root { --bg: #0d0d0d; --panel: #1a1a1a; --primary: #ff6600; --primary-hover: #e65c00; --text: #f0f0f0; --success: #28a745; --danger: #dc3545; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; margin: 0; overflow: hidden; }
        
        #sidebar { width: 380px; background: var(--panel); display: flex; flex-direction: column; border-right: 1px solid #333; }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #333; }
        .btn { padding: 12px; cursor: pointer; border: none; background: #333; color: white; margin-bottom: 8px; border-radius: 4px; font-weight: bold; width: 100%; transition: 0.2s; box-sizing: border-box; }
        .btn:hover { opacity: 0.9; }
        .btn-orange { background: var(--primary); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--primary); color: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-danger { background: var(--danger); }
        
        #search { width: 100%; padding: 10px; margin-top: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; }
        
        #list { flex: 1; overflow-y: auto; padding: 10px; }
        .file-item { padding: 12px; border-bottom: 1px solid #2a2a2a; cursor: pointer; font-size: 13px; display: flex; flex-direction: column; gap: 5px; }
        .file-item:hover { background: #252525; border-left: 3px solid var(--primary); }
        .status-badge { font-size: 10px; padding: 3px 6px; border-radius: 3px; font-weight: bold; width: max-content; }
        .badge-zip { background: #333; color: var(--primary); border: 1px solid var(--primary); }
        .badge-new { background: var(--success); color: #fff; }
        
        #main { flex: 1; padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; overflow-y: auto; }
        .panel-box { background: var(--panel); padding: 25px; border-radius: 8px; width: 100%; max-width: 600px; border: 1px solid #333; text-align: center; margin-bottom: 20px; }
        
        .audio-section { display: flex; justify-content: space-between; gap: 20px; width: 100%; margin-top: 15px; }
        .audio-box { flex: 1; text-align: center; background: #222; padding: 15px; border-radius: 6px; }
        audio { width: 100%; margin-top: 10px; height: 35px; outline: none; }
        
        .controls-row { display: flex; gap: 10px; margin: 20px 0; justify-content: center; width: 100%; }
        select { padding: 10px; background: #222; color: white; border: 1px solid #444; border-radius: 4px; }
        
        #record-btn { font-size: 18px; padding: 20px; border-radius: 50px; width: 100%; max-width: 300px; user-select: none; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">
        <button onclick="document.getElementById('f-input').click()" class="btn btn-orange">📁 1. Orijinal Ses Klasörünü Seç</button>
        <button onclick="document.getElementById('z-input').click()" class="btn btn-outline">📂 2. Eski ZIP'i Yükle (Devam Et)</button>
        <button onclick="startNewProject()" class="btn" style="background:#555;">🔄 Yeni Proje Başlat (Sıfırla)</button>
        <input type="text" id="search" placeholder="🔎 Dosya ara (örn: gman)...">
        <input type="file" id="f-input" webkitdirectory directory multiple style="display:none">
        <input type="file" id="z-input" accept=".zip" style="display:none">
    </div>
    <div id="list"></div>
    <button id="btn-load-more" class="btn" style="display:none; margin: 10px; width: 95%;">Daha Fazla Göster...</button>
</div>

<div id="main">
    <div class="panel-box">
        <h2 id="fname" style="color: var(--primary); margin: 0 0 10px 0; word-break: break-all;">Lütfen Yandan Dosya Seçin</h2>
        <div id="fpath" style="color: #888; font-size: 12px; margin-bottom: 20px;">Orjinal klasörü yükleyip bir dosyaya tıklayın.</div>
        
        <div class="audio-section" id="audio-players" style="display:none;">
            <div class="audio-box">
                <span style="color: #aaa; font-size: 12px;">Orijinal Ses</span>
                <audio id="audio-original" controls></audio>
            </div>
            <div class="audio-box" style="border: 1px solid var(--primary);">
                <span style="color: var(--primary); font-size: 12px;">Senin Kaydın / ZIP'teki Ses</span>
                <audio id="audio-recorded" controls></audio>
            </div>
        </div>
    </div>

    <div class="panel-box" id="recorder-ui" style="display:none;">
        <div class="controls-row">
            <select id="rec-mode">
                <option value="toggle">Mod: Tıkla Başla / Tıkla Bitir</option>
                <option value="hold">Mod: Basılı Tutarak Kaydet</option>
            </select>
            <select id="rec-delay">
                <option value="0">Gecikme: Yok (0 sn)</option>
                <option value="1">Gecikme: 1 Saniye</option>
                <option value="2">Gecikme: 2 Saniye</option>
                <option value="3">Gecikme: 3 Saniye</option>
            </select>
        </div>
        
        <button id="record-btn" class="btn btn-danger">🎙️ KAYDET</button>
        <p id="rec-status" style="color:#aaa; font-size:12px; margin-top:10px;">Kaydetmek için butona basın.</p>
    </div>

    <div class="panel-box" id="export-ui" style="display:none; border-color: var(--success);">
        <h3 style="margin-top:0;">Dışa Aktar / İndir</h3>
        <button onclick="downloadZip('merge')" class="btn btn-success">📦 1. Her Şeyi (Eski ZIP + Yeni Kayıtlar) İndir</button>
        <button onclick="downloadZip('new')" class="btn btn-outline" style="color: var(--success); border-color: var(--success);">📄 2. SADECE Yeni Eklenenleri İndir</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="app.js"></script>
</body>
</html>
