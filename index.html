<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Half-Life Ses Mod Aracı</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #141419; color: #fff; display: flex; margin: 0; height: 100vh; overflow: hidden; }
        #sidebar-panel { width: 350px; background: #0f0f13; border-right: 1px solid #23232a; display: flex; flex-direction: column; padding: 15px; }
        .main-area { flex: 1; padding: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #212129; }
        
        .btn { padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 10px; width: 100%; transition: 0.2s; text-align: center; }
        .btn:hover { opacity: 0.9; }
        
        #search-box { width: 100%; padding: 12px; background: #1a1a24; color: white; border: 1px solid #3d3d4a; border-radius: 6px; margin-bottom: 15px; box-sizing: border-box; }
        
        #sidebar-list-container { flex: 1; overflow-y: auto; }
        .file-item { padding: 12px; background: #1e1e24; margin-bottom: 5px; border-radius: 4px; cursor: pointer; border-left: 4px solid #3d3d4a; }
        .file-item.done { border-left-color: #10ac84; background: #23232a; }
        
        #current-file { margin-bottom: 20px; color: #ff9f43; word-break: break-all; text-align: center; max-width: 80%; }
        .recorder-btn { width: 200px; padding: 20px; font-size: 16px; border-radius: 50px; }
    </style>
</head>
<body>

<div id="sidebar-panel">
    <label for="folder-select" class="btn" style="background:#ff9f43; color:#000;">📁 Ses Klasörünü Seç</label>
    <input type="file" id="folder-select" webkitdirectory directory multiple style="display:none;">

    <label for="import-zip" class="btn" style="background:#5f27cd; color:#fff;">📂 Eski Projeyi (ZIP) Yükle</label>
    <input type="file" id="import-zip" accept=".zip" style="display:none;">

    <hr style="width:100%; border:0; border-top:1px solid #23232a; margin: 15px 0;">

    <input type="text" id="search-box" placeholder="🔎 Dosya ara (örn: gman)...">
    
    <div id="sidebar-list-container"></div>
    
    <button id="btn-load-more" class="btn" style="display:none; background:#3d3d4a;">Daha Fazla Yükle...</button>
    
    <button id="btn-download-mod" class="btn" style="background:#10ac84; color:white; margin-top: auto;">🎁 MODU ZIP OLARAK İNDİR</button>
</div>

<div class="main-area">
    <h2 id="current-file">Lütfen bir ses dosyası seçin</h2>
    <button id="btn-start" class="btn recorder-btn" style="background:#ee5253; color:white;" disabled>🎙️ Kayda Başla</button>
    <button id="btn-stop" class="btn recorder-btn" style="background:#10ac84; color:white; display:none;">🛑 Kaydı Bitir</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="app.js"></script>
</body>
</html>
