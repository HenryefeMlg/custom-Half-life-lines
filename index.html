<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Half-Life Gelişmiş Mod Aracı</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #eee; display: flex; height: 100vh; margin: 0; }
        #sidebar { width: 350px; background: #1a1a1a; display: flex; flex-direction: column; border-right: 1px solid #333; }
        #main { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .btn { padding: 12px; cursor: pointer; border: none; background: #333; color: white; margin: 5px; border-radius: 4px; font-weight: bold; width: 95%; }
        .file-item { padding: 10px; border-bottom: 1px solid #333; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; }
        .file-item:hover { background: #252525; }
        .done { color: #4caf50; font-weight: bold; }
        .done-text { font-size: 10px; background: #4caf50; color: #000; padding: 2px 5px; border-radius: 3px; }
        #editor { width: 80%; height: 60%; display: none; background: #000; color: #fff; padding: 15px; border: 1px solid #333; }
        #audio-player { margin-top: 20px; width: 100%; max-width: 400px; outline: none; }
        #recorder-ui { display: flex; flex-direction: column; align-items: center; gap: 15px; width: 100%; }
    </style>
</head>
<body>

<div id="sidebar">
    <div style="padding: 10px; text-align: center;">
        <button onclick="document.getElementById('f-input').click()" class="btn" style="background:#ff9f43; color:#000;">📁 1. Orijinal Klasörü Seç</button>
        <button onclick="document.getElementById('z-input').click()" class="btn" style="background:#5f27cd;">📂 2. Eski ZIP'i Yükle</button>
        <button onclick="downloadZip()" class="btn" style="background:#10ac84; margin-top: 20px;">🎁 3. ZIP İÇİNE YAZ VE İNDİR</button>
        
        <input type="file" id="f-input" webkitdirectory directory multiple style="display:none">
        <input type="file" id="z-input" accept=".zip" style="display:none">
        <input type="text" id="search" placeholder="🔎 Dosya ara..." style="width:90%; padding:8px; margin-top:15px; background:#222; border:1px solid #444; color:white;">
    </div>
    <div id="list" style="flex:1; overflow-y:auto;"></div>
    <button id="load-more" class="btn" style="display:none;">Daha Fazla Göster...</button>
</div>

<div id="main">
    <h3 id="fname" style="color: #ff9f43; margin-bottom: 5px;">Lütfen listeden bir dosya seçin</h3>
    <small id="fpath" style="color: #888; margin-bottom: 20px;"></small>
    
    <textarea id="editor"></textarea>
    
    <div id="recorder-ui" style="display:none;">
        <audio id="audio-player" controls title="Şu anki sesi dinle"></audio>
        
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button id="btn-start" class="btn" style="background:#ee5253; padding: 15px 30px; width: auto;">🎙️ YENİ SES KAYDET</button>
            <button id="btn-stop" class="btn" style="background:#10ac84; padding: 15px 30px; width: auto; display:none;">🛑 KAYDI BİTİR</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="app.js"></script>
</body>
</html>
